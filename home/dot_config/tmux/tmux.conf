# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'jimeh/tmuxifier'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'niqodea/tmux-matryoshka'
# set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'

# Nested tmux workflow
set -g @matryoshka_down_keybind 'F12'
set -g @matryoshka_up_keybind 'F11'
set -g @matryoshka_up_recursive_keybind 'F10'
set -g @matryoshka_inactive_status_style_strategy 'assignment'
set -g @matryoshka_inactive_status_style 'bg=#{@thm_bg},fg=#{@thm_fg}'
set -g @matryoshka_status_style_option 'status-style'

# Appearance
set-hook -g client-dark-theme {
  source-file ~/.config/tmux/catppuccin_mocha.conf

  set -g @status_left_normal "#[fg=#{@thm_surface_0},bg=default]#[fg=#{@thm_fg},bg=#{@thm_surface_0}]  #S #[fg=#{@thm_surface_0},bg=default]"
  set -g @status_left_prefix "#[fg=#{@thm_mauve},bg=default]#[fg=#{@thm_bg},bg=#{@thm_mauve},bold]  #S #[fg=#{@thm_mauve},bg=default,nobold]"
  set -g @status_right_normal "#[fg=#{@thm_surface_0}]#[bg=#{@thm_surface_0},fg=#{@thm_fg}]#{?window_bigger,[#{window_offset_x}#,#{window_offset_y}] ,}'#{=21:pane_title}'#[default]#[fg=#{@thm_surface_0}]"
  set -g @status_right_nested "#[fg=#{@thm_mauve},bg=default]#[fg=#{@thm_bg},bg=#{@thm_mauve},bold] ↓ #{@matryoshka_counter} #[fg=#{@thm_mauve},bg=default,nobold]"

  set -g message-style "bg=#{@thm_bg},fg=#{@thm_fg}"
  set -g status-style "bg=#{@thm_bg},fg=#{@thm_fg}"
  set -g window-status-style "fg=#{@thm_surface_2}"
  set -g window-status-current-style "fg=#{@thm_mauve},bold"
  set -g pane-border-style "fg=#{@thm_surface_1}"
  set -g pane-active-border-style "fg=#{@thm_yellow}"
  set -g mode-style "fg=#{@thm_fg},bg=#{@thm_overlay_2}"
  set -g copy-mode-match-style "fg=#{@thm_bg},bg=#{@thm_fg}"
  set -g copy-mode-current-match-style "fg=#{@thm_bg},bg=#{@thm_red}"
  set -g copy-mode-position-style "fg=#{@thm_fg},bg=#{@thm_bg}"

  set -g status-left "#{?client_prefix,#{E:@status_left_prefix},#{E:@status_left_normal}}"
  set -g window-status-format "#[fg=#{@thm_surface_0}]#[bg=#{@thm_surface_0},fg=#{@thm_fg}] #{window_index} #W#{?window_zoomed_flag, ,} #[default]#[fg=#{@thm_surface_0}]"
  set -g window-status-current-format "#[fg=#{@thm_mauve}]#[bg=#{@thm_mauve},fg=#{@thm_bg}] #{window_index} #W#{?window_zoomed_flag, ,} #[default]#[fg=#{@thm_mauve}]"
  set -g status-right "#{?#{@matryoshka_counter},#{E:@status_right_nested},#{E:@status_right_normal}}"
}
set-hook -g client-light-theme {
  source-file ~/.config/tmux/catppuccin_latte.conf

  set -g @status_left_normal "#[fg=#{@thm_surface_0},bg=default]#[fg=#{@thm_fg},bg=#{@thm_surface_0}]  #S #[fg=#{@thm_surface_0},bg=default]"
  set -g @status_left_prefix "#[fg=#{@thm_mauve},bg=default]#[fg=#{@thm_bg},bg=#{@thm_mauve},bold]  #S #[fg=#{@thm_mauve},bg=default,nobold]"
  set -g @status_right_normal "#[fg=#{@thm_surface_0}]#[bg=#{@thm_surface_0},fg=#{@thm_fg}]#{?window_bigger,[#{window_offset_x}#,#{window_offset_y}] ,}'#{=21:pane_title}'#[default]#[fg=#{@thm_surface_0}]"
  set -g @status_right_nested "#[fg=#{@thm_mauve},bg=default]#[fg=#{@thm_bg},bg=#{@thm_mauve},bold] ↓ #{@matryoshka_counter} #[fg=#{@thm_mauve},bg=default,nobold]"

  set -g message-style "bg=#{@thm_bg},fg=#{@thm_fg}"
  set -g status-style "bg=#{@thm_bg},fg=#{@thm_fg}"
  set -g window-status-style "fg=#{@thm_surface_2}"
  set -g window-status-current-style "fg=#{@thm_mauve},bold"
  set -g pane-border-style "fg=#{@thm_surface_1}"
  set -g pane-active-border-style "fg=#{@thm_yellow}"
  set -g mode-style "fg=#{@thm_fg},bg=#{@thm_overlay_2}"
  set -g copy-mode-match-style "fg=#{@thm_bg},bg=#{@thm_fg}"
  set -g copy-mode-current-match-style "fg=#{@thm_bg},bg=#{@thm_red}"
  set -g copy-mode-position-style "fg=#{@thm_fg},bg=#{@thm_bg}"

  set -g status-left "#{?client_prefix,#{E:@status_left_prefix},#{E:@status_left_normal}}"
  set -g window-status-format "#[fg=#{@thm_surface_0}]#[bg=#{@thm_surface_0},fg=#{@thm_fg}] #{window_index} #W#{?window_zoomed_flag, ,} #[default]#[fg=#{@thm_surface_0}]"
  set -g window-status-current-format "#[fg=#{@thm_mauve}]#[bg=#{@thm_mauve},fg=#{@thm_bg}] #{window_index} #W#{?window_zoomed_flag, ,} #[default]#[fg=#{@thm_mauve}]"
  set -g status-right "#{?#{@matryoshka_counter},#{E:@status_right_nested},#{E:@status_right_normal}}"
}
set -g cursor-style default
set -g status-position top
set -g status-justify absolute-centre
set -g window-status-separator ""

# Key Binding
## Navigation
set -g prefix C-Space
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Y send -X copy-end-of-line
bind-key b copy-mode\;\
       send-keys -X start-of-line\;\
       send-keys -X search-backward "❯"
bind-key f copy-mode\;\
       send-keys -X start-of-line\;\
       send-keys -X search-backward "FCN="

## Window
bind-key t new-window -c "#{pane_current_path}"
bind-key -n C-w kill-window
bind-key w kill-window

## Pane
bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"
bind-key X kill-pane

# Misc
set -g default-terminal "tmux-256color"
set -gsa terminal-features ',xterm-ghostty:RGB,kitty:RGB,xterm-kitty:RGB'
set -g mouse on
set -g automatic-rename on
set -g automatic-rename-format '#{pane_current_command}'
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -gw pane-base-index 1
set -gw mode-keys vi
set -g allow-rename on
set -gs escape-time 0
set -gs repeat-time 0
set -g allow-passthrough on
set -ga update-environment LANG
set -ga update-environment LC_ALL
set -ga update-environment LC_CTYPE
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

run '~/.config/tmux/plugins/tpm/tpm'
