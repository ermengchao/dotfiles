# This group of options represents a command-line option. Flags explicitly
# added when running (ie: btm -a) will override this config file if an option
# is also set here.
[flags]
hide_avg_cpu = false

average_cpu_row = true

dot_marker = false

rate = "1s"

cpu_left_legend = false

current_usage = false

unnormalized_cpu = false

group_processes = true

case_sensitive = false

whole_word = true

regex = true

temperature_type = "celsius"

default_time_value = "60s"

time_delta = 15000

hide_time = false

default_widget_type = "cpu"
default_widget_count = 1

expanded = false

basic = false

use_old_network_legend = false

hide_table_gap = true

battery = false

disable_click = true

disable_keys = false

process_memory_as_value = false

tree = true

show_table_scroll_position = true

process_command = true

network_use_binary_prefix = false

network_use_bytes = true

network_use_log = true

disable_advanced_kill = false

hide_k_threads = false

disable_gpu = false

# Shows cache and buffer memory
#enable_cache_memory = false

# Subtract freeable ARC from memory usage
#free_arc = false

retention = "10m"

memory_legend = "top-right"

network_legend = "top-right"

[processes]
columns = ["PID", "Name", "CPU%", "Mem%", "Virt", "R/s", "W/s", "T.Read", "T.Write", "User", "State", "GMem%", "GPU%"]
get_threads = false

[cpu]
default = "avg"

[disk]
columns = ["Disk", "Mount", "Used", "Free", "Total", "Used%", "R/s", "W/s"]

#[disk.name_filter]
#is_list_ignored = true
#list = ["/dev/sda\\d+", "/dev/nvme0n1p2"]
#regex = true
#case_sensitive = false
#whole_word = false

[disk.mount_filter]
is_list_ignored = true
list = [
  "/$",
  "/System/Volumes/ISCPreboot",
  "/System/Volumes/Preboot",
  "/System/Volumes/Update",
  "/System/Volumes/xarts",
  "/System/Volumes/Hardware",
  "/System/Volumes/VM",
  "/private/tmp/.*",
  "/boot",
  "/boot/efi"
]
regex = true
case_sensitive = false
whole_word = false

[temperature]
[temperature.sensor_filter]
is_list_ignored = true
list = [
  "PMU tdev\\d+",
  "PMU2 tdev\\d+"
]
regex = true
case_sensitive = false
whole_word = false

#[network]
#[network.interface_filter]
#is_list_ignored = true
#list = ["virbr0.*"]
#regex = true
#case_sensitive = false
#whole_word = false

[[row]]
  ratio=30
  [[row.child]]
  ratio=2
  type="cpu"
  [[row.child]]
  ratio=1
  type="temp"
[[row]]
  ratio=30
  [[row.child]]
    ratio=2
    type="mem"
  [[row.child]]
    ratio = 1
    type="net"
[[row]]
  ratio=20
  [[row.child]]
  type="proc"
[[row]]
  ratio=20
  [[row.child]]
  type="disk"

[styles.cpu]
all_entry_color = "#f5e0dc"
avg_entry_color = "#eba0ac"
cpu_core_colors = ["#f38ba8","#fab387","#f9e2af","#a6e3a1","#74c7ec","#cba6f7"]
[styles.memory]
ram_color = "#a6e3a1"
cache_color = "#f38ba8"
swap_color = "#fab387"
gpu_colors = ["#74c7ec","#cba6f7","#f38ba8","#fab387","#f9e2af","#a6e3a1"]
arc_color = "#89dceb"
[styles.network]
rx_color = "#a6e3a1"
tx_color = "#f38ba8"
rx_total_color = "#89dceb"
tx_total_color = "#a6e3a1"
[styles.battery]
high_battery_color = "#a6e3a1"
medium_battery_color = "#f9e2af"
low_battery_color = "#f38ba8"
[styles.tables]
headers = {color = "#f5e0dc"}
[styles.graphs]
graph_color = "#a6adc8"
legend_text = {color = "#a6adc8"}
[styles.widgets]
border_color = "#585b70"
selected_border_color = "#f5c2e7"
widget_title = {color = "#f2cdcd"}
text = {color = "#cdd6f4"}
selected_text = {color = "#11111b", bg_color = "#cba6f7"}
disabled_text = {color = "#1e1e2e"}
