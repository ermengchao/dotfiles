# This group of options represents a command-line option. Flags explicitly
# added when running (ie: btm -a) will override this config file if an option
# is also set here.
[flags]
hide_avg_cpu = false

average_cpu_row = true

dot_marker = false

rate = "1s"

cpu_left_legend = false

current_usage = false

unnormalized_cpu = false

group_processes = true

case_sensitive = false

whole_word = true

regex = true

temperature_type = "celsius"

default_time_value = "60s"

time_delta = 15000

hide_time = false

default_widget_type = "cpu"
default_widget_count = 1

expanded = false

basic = false

use_old_network_legend = false

hide_table_gap = true

battery = false

disable_click = true

disable_keys = false

process_memory_as_value = false

tree = true

show_table_scroll_position = true

process_command = true

network_use_binary_prefix = false

network_use_bytes = true

network_use_log = true

disable_advanced_kill = false

hide_k_threads = false

disable_gpu = false

# Shows cache and buffer memory
#enable_cache_memory = false

# Subtract freeable ARC from memory usage
#free_arc = false

retention = "10m"

memory_legend = "top-right"

network_legend = "top-right"

[processes]
columns = ["PID", "Name", "CPU%", "Mem%", "Virt", "R/s", "W/s", "T.Read", "T.Write", "User", "State", "GMem%", "GPU%"]
get_threads = false

[cpu]
default = "avg"

[disk]
columns = ["Disk", "Mount", "Used", "Free", "Total", "Used%", "R/s", "W/s"]

#[disk.name_filter]
#is_list_ignored = true
#list = ["/dev/sda\\d+", "/dev/nvme0n1p2"]
#regex = true
#case_sensitive = false
#whole_word = false

[disk.mount_filter]
is_list_ignored = true
list = [
  "/$",
  "/System/Volumes/ISCPreboot",
  "/System/Volumes/Preboot",
  "/System/Volumes/Update",
  "/System/Volumes/xarts",
  "/System/Volumes/Hardware",
  "/System/Volumes/VM",
  "/private/tmp/.*",
  "/boot",
  "/boot/efi"
]
regex = true
case_sensitive = false
whole_word = false

[temperature]
[temperature.sensor_filter]
is_list_ignored = true
list = [
  "PMU tdev\\d+",
  "PMU2 tdev\\d+"
]
regex = true
case_sensitive = false
whole_word = false

#[network]
#[network.interface_filter]
#is_list_ignored = true
#list = ["virbr0.*"]
#regex = true
#case_sensitive = false
#whole_word = false

[[row]]
  ratio=30
  [[row.child]]
  ratio=2
  type="cpu"
  [[row.child]]
  ratio=1
  type="temp"
[[row]]
  ratio=30
  [[row.child]]
    ratio=2
    type="mem"
  [[row.child]]
    ratio = 1
    type="net"
[[row]]
  ratio=20
  [[row.child]]
  type="proc"
[[row]]
  ratio=20
  [[row.child]]
  type="disk"

[styles.cpu]
all_entry_color = "#dc8a78"
avg_entry_color = "#e64553"
cpu_core_colors = ["#d20f39","#fe640b","#df8e1d","#40a02b","#209fb5","#8839ef"]
[styles.memory]
ram_color = "#40a02b"
cache_color = "#d20f39"
swap_color = "#fe640b"
gpu_colors = ["#209fb5","#8839ef","#d20f39","#fe640b","#df8e1d","#40a02b"]
arc_color = "#04a5e5"
[styles.network]
rx_color = "#40a02b"
tx_color = "#d20f39"
rx_total_color = "#04a5e5"
tx_total_color = "#40a02b"
[styles.battery]
high_battery_color = "#40a02b"
medium_battery_color = "#df8e1d"
low_battery_color = "#d20f39"
[styles.tables]
headers = {color = "#dc8a78"}
[styles.graphs]
graph_color = "#6c6f85"
legend_text = {color = "#6c6f85"}
[styles.widgets]
border_color = "#acb0be"
selected_border_color = "#ea76cb"
widget_title = {color = "#dd7878"}
text = {color = "#4c4f69"}
selected_text = {color = "#dce0e8", bg_color = "#8839ef"}
disabled_text = {color = "#eff1f5"}
