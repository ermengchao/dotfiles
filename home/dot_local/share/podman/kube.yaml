apiVersion: v1
kind: ConfigMap
metadata:
  name: elk-stack-config
data:
  logstash.yml: |
    http.host: 0.0.0.0
    xpack.monitoring.enabled: false
  logstash.conf: |
    input {
      kafka {
        bootstrap_servers => "localhost:9092"
        topics => ["logs"]
        auto_offset_reset => "earliest"
        codec => json
      }
    }

    filter {
      if ![event][original] and [message] {
        mutate {
          add_field => { "[event][original]" => "%{message}" }
        }
      }
    }

    output {
      elasticsearch {
        hosts => ["http://localhost:9200"]
        index => "logs-%{+YYYY.MM.dd}"
      }
      stdout { codec => rubydebug }
    }
---
apiVersion: v1
kind: Pod
metadata:
  name: elk-stack
  labels:
    app: elk-stack
spec:
  restartPolicy: Always
  containers:
    - name: kafka
      image: docker.io/apache/kafka:3.7.1
      env:
        - name: CLUSTER_ID
          value: "MkU3OEVBNTcwNTJENDM2Qk"
        - name: KAFKA_NODE_ID
          value: "1"
        - name: KAFKA_PROCESS_ROLES
          value: "broker,controller"
        - name: KAFKA_CONTROLLER_LISTENER_NAMES
          value: "CONTROLLER"
        - name: KAFKA_INTER_BROKER_LISTENER_NAME
          value: "BROKER"
        - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
          value: "BROKER:PLAINTEXT,CONTROLLER:PLAINTEXT"
        - name: KAFKA_LISTENERS
          value: "BROKER://:9092,CONTROLLER://:9093"
        - name: KAFKA_ADVERTISED_LISTENERS
          value: "BROKER://localhost:9092"
        - name: KAFKA_CONTROLLER_QUORUM_VOTERS
          value: "1@localhost:9093"
        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "1"
        - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
          value: "1"
        - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
          value: "1"
        - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
          value: "true"
      ports:
        - containerPort: 9092
          hostPort: 9092
        - containerPort: 9093
    - name: elasticsearch
      image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
      env:
        - name: discovery.type
          value: single-node
        - name: xpack.security.enabled
          value: "false"
        - name: ES_JAVA_OPTS
          value: "-Xms512m -Xmx512m"
      ports:
        - containerPort: 9200
          hostPort: 9200
        - containerPort: 9300
    - name: logstash
      image: docker.elastic.co/logstash/logstash:8.13.4
      env:
        - name: LS_JAVA_OPTS
          value: "-Xms256m -Xmx256m"
      volumeMounts:
        - name: logstash-config
          mountPath: /usr/share/logstash/config/logstash.yml
          subPath: logstash.yml
        - name: logstash-config
          mountPath: /usr/share/logstash/pipeline/logstash.conf
          subPath: logstash.conf
    - name: kibana
      image: docker.elastic.co/kibana/kibana:8.13.4
      env:
        - name: ELASTICSEARCH_HOSTS
          value: http://localhost:9200
        - name: XPACK_SECURITY_ENABLED
          value: "false"
      ports:
        - containerPort: 5601
          hostPort: 5601
  volumes:
    - name: logstash-config
      configMap:
        name: elk-stack-config
